name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt

      - name: Rodar lint
        run: |
          ruff check .

      - name: Rodar testes
        run: |
          pytest